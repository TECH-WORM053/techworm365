name: Deploy Codex Mirror to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "codex-ai-mirror-prototype/**"
      - ".github/workflows/codex-mirror-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: codex-mirror-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify prototype
        working-directory: codex-ai-mirror-prototype
        run: |
          node --check app.js
          node --check server.mjs
          node smoke-test.mjs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Codex prototype
        uses: actions/upload-pages-artifact@v4
        with:
          path: codex-ai-mirror-prototype

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

