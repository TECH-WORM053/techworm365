name: Deploy Mirror Prototypes to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "codex-ai-mirror-prototype/**"
      - "prototype/ai-mirror-v2/**"
      - ".github/workflows/codex-mirror-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: codex-mirror-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Verify codex prototype
        working-directory: codex-ai-mirror-prototype
        run: |
          npm run check
          npm test

      - name: Verify ai-mirror-v2
        working-directory: prototype/ai-mirror-v2
        run: |
          node --check app.js
          node --check analyzer.js
          node --check catalog.js
          node --check effects.js
          node --check serve.mjs

      - name: Stage site (root = codex, /v2 = ai-mirror-v2)
        run: |
          mkdir -p _site/v2
          cp -r codex-ai-mirror-prototype/. _site/
          cp -r prototype/ai-mirror-v2/. _site/v2/
          rm -f _site/v2/*.pem _site/v2/serve.mjs _site/v2/package.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload prototypes
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
