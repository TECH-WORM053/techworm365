<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>FOLD / FACE — Codex Motion Prototype</title>
  <link rel="stylesheet" href="./styles.css">
  <link rel="stylesheet" href="./error.css">
</head>
<body>
  <main class="shell">
    <header>
      <a class="brand" href=".">FOLD / FACE</a>
      <div class="status"><i id="dot"></i><span id="status">READY</span></div>
      <span class="edition">CODEX 001</span>
    </header>
    <section class="stage" id="stage">
      <video id="camera" autoplay muted playsinline></video>
      <canvas id="handFx" aria-hidden="true"></canvas>
      <div id="three"></div>
      <div class="grain"></div>
      <div class="guide" id="guide"><span></span><p>얼굴을 프레임 안에 맞춰주세요</p></div>
      <div class="intro" id="intro">
        <p class="eyebrow">REAL-TIME EYEWEAR STUDY</p>
        <h1>접히고,<br>다가오고,<br><em>착용된다.</em></h1>
        <button id="start">카메라 시작</button>
        <small>영상은 기기 밖으로 전송되지 않습니다.</small>
        <p class="error" id="error" role="alert"></p>
      </div>
      <aside class="telemetry">
        <span>OBJECT</span><b>CHROME 001</b>
        <span>STATE</span><b id="state">FOLDED</b>
        <span>FACE SIZE</span><b id="faceSize">—</b>
        <span>YAW / ROLL</span><b id="facePose">—</b>
      </aside>
      <div class="gesture-help"><b>HAND CONTROL</b><span>안경 옆에서 엄지와 검지를 붙이면 접힘</span><span>두 손가락을 벌리면 펼쳐짐</span></div>
      <button class="replay" id="replay" hidden>↻ 다시 펼치기</button>
    </section>
    <footer><span>MEDIAPIPE FACE LANDMARKER</span><span>PROCEDURAL THREE.JS OBJECT</span><span>ON-DEVICE / NO API</span></footer>
  </main>
  <script type="module" src="./app.js"></script>
</body>
</html>
