<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLASSES PLAY — 모션트래킹 선글라스</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 시작 화면 -->
  <section id="intro" class="screen active">
    <div class="intro-box">
      <p class="brand">GLASSES PLAY</p>
      <p class="version">motion tracking toy</p>

      <ul class="guide">
        <li><span class="gesture">🙌 두 손을 모으고 벌리기</span> 코 브릿지가 접혔다 펴집니다</li>
        <li><span class="gesture">✌️ 한 손 검지·약지 오므리고 펴기</span> 다리가 접혔다 펴집니다</li>
        <li><span class="gesture">🤏 엄지+검지로 집어서 얼굴로</span> 착용됩니다 (다시 집으면 벗기)</li>
      </ul>

      <button id="btn-start" class="btn-primary">카메라 켜고 시작</button>
      <p id="camera-error" class="error hidden"></p>
      <p class="privacy">영상은 어디에도 전송·저장되지 않습니다. 모든 처리는 이 브라우저 안에서 끝납니다.</p>
    </div>
  </section>

  <!-- 플레이 화면 -->
  <section id="play" class="screen">
    <video id="video" autoplay playsinline muted class="hidden"></video>
    <canvas id="stage"></canvas>

    <div class="hud">
      <p class="brand small">GLASSES PLAY</p>
      <p id="status" class="status">거울을 깨우는 중…</p>
    </div>

    <div class="help">
      <p>🙌 브릿지 접기 · ✌️ 다리 접기 · 🤏 집어서 얼굴로 = 착용</p>
      <button id="btn-reset" class="btn-mini">선글라스 위치 초기화</button>
    </div>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
