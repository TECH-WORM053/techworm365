<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; media-src 'self' blob:; connect-src 'self'; worker-src 'self' blob:;" />
  <title>AI Mirror v2 — Motion Tracking Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="fx"></canvas>

    <!-- 시작 화면 -->
    <section id="intro" class="panel">
      <h1>AI Mirror <span>v2</span></h1>
      <p>
        카메라 앞에 서면 얼굴형·무드·스타일을 기기 안에서 추정하고,<br />
        배경과 문구, 추천 제품이 실시간으로 바뀌는 프로토타입입니다.
      </p>
      <p class="privacy">
        모든 계산은 이 기기 안에서만 이루어집니다. 영상과 사진은 어디에도 전송·저장되지 않습니다.
      </p>
      <button id="startBtn">거울 켜기</button>
      <button id="flipBtn" class="ghost" hidden>전면 / 후면 전환</button>
    </section>

    <!-- 문구 -->
    <div id="phrase" class="hidden"></div>

    <!-- 분석 상태 HUD -->
    <div id="hud" class="hidden">
      <span id="hudShape">—</span>
      <span id="hudMood">—</span>
      <span id="hudStyle">—</span>
      <span class="hud-note">기기 내 근사치</span>
    </div>

    <!-- 추천 목록 -->
    <aside id="recs" class="hidden">
      <h2>지금의 당신에게</h2>
      <ol id="recList"></ol>
    </aside>

    <div id="status" class="hidden">카메라를 준비하는 중…</div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
