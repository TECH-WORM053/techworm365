<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
    <meta name="theme-color" content="#05070b" />
    <meta name="description" content="휴대폰에서 실행되는 MediaPipe 핸드 트래킹 PLY 모핑 프로토타입" />
    <title>Codex Hand Morph</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main class="stage" id="stage">
      <video id="camera" autoplay muted playsinline></video>
      <canvas id="scene" aria-label="손동작으로 반응하는 점 구름"></canvas>

      <header class="hud hud--top">
        <div class="brand">CODEX / HAND MORPH</div>
        <div class="status"><i id="status-dot"></i><span id="status">READY</span></div>
      </header>

      <section class="intro" id="intro">
        <p>ON-DEVICE MEDIAPIPE</p>
        <h1>손으로 형태를<br />움직여보세요.</h1>
        <p class="intro__copy">핀치하면 흩어지고, 놓으면 다음 형태로 바뀝니다. 양손 간격으로 크기를 조절할 수 있습니다.</p>
        <button id="start" type="button">카메라 시작</button>
        <small>영상은 저장하거나 서버로 전송하지 않습니다.</small>
      </section>

      <div class="reticle" id="reticle" hidden><span></span></div>

      <footer class="hud hud--bottom" id="controls" hidden>
        <div><small>GESTURE</small><strong id="gesture">SHOW HAND</strong></div>
        <div><small>SHAPE</small><strong id="shape">SPHERE</strong></div>
        <button id="flip" type="button" aria-label="카메라 전환">↺</button>
      </footer>

      <div class="error" id="error" hidden>
        <strong>카메라를 시작할 수 없습니다.</strong>
        <p id="error-copy"></p>
        <button id="retry" type="button">다시 시도</button>
      </div>
    </main>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
